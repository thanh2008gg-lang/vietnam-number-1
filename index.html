
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Việt Nam vô địch😘😘</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* Banner */
.banner {
    height: 100vh;
    background: url('https://upload.wikimedia.org/wikipedia/commons/2/21/Ha_Long_Bay.jpg') center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}
.banner h1 {
    background: rgba(0,0,0,0.5);
    padding: 20px;
    font-size: 40px;
}

/* Section */
.section {
    height: 400px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}
.section h2 {
    background: rgba(0,0,0,0.5);
    padding: 10px;
}

/* Background */
.halong { background: url('https://upload.wikimedia.org/wikipedia/commons/2/21/Ha_Long_Bay.jpg') center/cover; }
.hoian { background: url('https://upload.wikimedia.org/wikipedia/commons/e/e4/Hoi_An.jpg') center/cover; }
.dalat { background: url('https://upload.wikimedia.org/wikipedia/commons/6/6b/Da_Lat.jpg') center/cover; }

/* Slider */
.slider {
    width: 100%;
    height: 300px;
    overflow: hidden;
}
.slides {
    display: flex;
    width: 300%;
    animation: slide 12s infinite;
}
.slides img {
    width: 100%;
}
@keyframes slide {
    0% {margin-left: 0;}
    33% {margin-left: -100%;}
    66% {margin-left: -200%;}
}

/* Button */
.music-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 10px;
    background: red;
    color: white;
    border: none;
}

/* Video */
.video {
    background: black;
    text-align: center;
    padding: 20px;
}
</style>

</head>

<body>

<!-- 🎵 NHẠC NỀN -->
<audio id="bgMusic" loop>
    <source src="quocca.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵 Nhạc</button>

<!-- 🇻🇳 VIDEO QUỐC CA -->
<div class="video">
    <h2 style="color:white;">Quốc ca Việt Nam</h2>
    <iframe width="90%" height="300"
    src="https://www.youtube.com/embed/gy7_kS8PJHo"
    frameborder="0" allowfullscreen>
    </iframe>
</div>

<!-- Banner -->
<div class="banner">
    <h1>🇻🇳 Việt Nam tuyệt đẹp</h1>
</div>

<!-- Slider -->
<div class="slider">
    <div class="slides">
        <img src="https://cdn-media.sforum.vn/storage/app/media/ctv_seo3/anh-vinh-ha-long-thumbnail.jpg">
        <img src="https://cdn-media.sforum.vn/storage/app/media/ctv_seo3/anh-vinh-ha-long-thumbnail.jpg">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Da_Lat.jpg">
    </div>
</div>

<!-- Section -->
<div class="section halong">
    <h2>Vịnh Hạ Long</h2>
</div>

<div class="section hoian">
    <h2>Hội An</h2>
</div>

<div class="section dalat">
    <h2>Đà Lạt</h2>
</div>

<script>
function toggleMusic() {
    var music = document.getElementById("bgMusic");
    if (music.paused) {
        music.play();
    } else {
        music.pause();
    }
}
</script>

</body>
</html>
