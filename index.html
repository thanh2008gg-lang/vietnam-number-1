<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khám phá Việt Nam</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* Header */
header {
    background: linear-gradient(to right, red, orange);
    color: white;
    text-align: center;
    padding: 50px 20px;
}

/* Menu */
nav {
    background: #222;
    padding: 10px;
    text-align: center;
}
nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
    font-weight: bold;
}
nav a:hover {
    color: yellow;
}

/* Section */
.section {
    padding: 40px;
    text-align: center;
}

/* Card */
.card {
    display: inline-block;
    width: 300px;
    margin: 15px;
    background: #f4f4f4;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
}

/* Image */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* Footer */
footer {
    background: #222;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>

</head>

<body>

<header>
    <h1>🇻🇳 Khám phá Việt Nam</h1>
    <p>Thiên nhiên - Văn hóa - Ẩm thực</p>
</header>

<nav>
    <a href="#place">Địa điểm</a>
    <a href="#food">Ẩm thực</a>
</nav>

<div class="section" id="place">
    <h2>📍 Địa điểm nổi tiếng</h2>

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/21/Ha_Long_Bay.jpg">
        <h3>Vịnh Hạ Long</h3>
        <p>Kỳ quan thiên nhiên thế giới</p>
    </div>

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Hoi_An.jpg">
        <h3>Hội An</h3>
        <p>Phố cổ lung linh</p>
    </div>

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Da_Lat.jpg">
        <h3>Đà Lạt</h3>
        <p>Thành phố ngàn hoa</p>
    </div>

</div>

<div class="section" id="food">
    <h2>🍜 Ẩm thực Việt Nam</h2>

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/1c/Pho.jpg">
        <h3>Phở</h3>
    </div>

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/45/Banh_mi.jpg">
        <h3>Bánh mì</h3>
    </div>

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/60/Bun_cha.jpg">
        <h3>Bún chả</h3>
    </div>

</div>

<footer>
    <p>© 2026 - Website Việt Nam</p>
</footer>

</body>
</html>
